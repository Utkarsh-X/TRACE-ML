<!DOCTYPE html>

<html class="dark" lang="en"><head>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-tertiary": "#1b1c1c",
                      "on-secondary-fixed-variant": "#3a3b42",

                      "on-primary-container": "#000000",
                      "on-error-container": "#ffdad6",
                      "on-secondary": "#1a1b22",
                      "surface-variant": "#121212",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 20;
        }
        body {
            background-color: #080808;
            color: #e2e2e2;
            overflow: hidden;
        }
    </style>
</head>
<body class="font-body selection:bg-white selection:text-black">
<main class="h-screen w-screen flex flex-col relative bg-background">
<!-- Centered Error Message -->
<div class="flex-1 flex flex-col items-center justify-center p-6 text-center select-none">
<div class="flex flex-col items-center gap-12 max-w-md">
<div class="space-y-4">
<h1 class="text-2xl md:text-3xl font-extralight tracking-[0.2em] text-white opacity-90 uppercase">
                        Connection Lost
                    </h1>
<p class="font-mono text-[11px] text-on-surface-variant tracking-wider opacity-60">
                        Re-establishing link to secure node...
                    </p>
</div>
<button class="px-10 py-3 bg-white text-black font-mono text-[10px] font-bold tracking-[0.3em] hover:bg-zinc-200 transition-all active:scale-95">
                    RETRY
                </button>
</div>
</div>
<!-- Minimal Diagnostics & Metadata -->
<div class="p-8 flex flex-col md:flex-row justify-between items-end gap-6 bg-surface-container-low/30">
<!-- Diagnostic Logs (Bottom Left) -->
<div class="font-mono text-[9px] text-on-surface-variant leading-relaxed opacity-40 max-w-sm">
<p>SESSION_ID: TR-8842-X</p>
<p>STATUS: ERR_SIGNAL_LOSS</p>
</div>
<!-- System State (Bottom Right) -->
<div class="flex flex-col items-end gap-2">
<div class="flex items-center gap-3">
<div class="flex items-center gap-2">
<span class="w-1 h-1 rounded-full bg-error"></span>
<span class="font-mono text-[9px] text-on-surface-variant tracking-widest uppercase">Node_01: Offline</span>
</div>
<span class="font-mono text-[9px] text-on-surface-variant/30 tracking-tighter">V4.2.0-STABLE</span>
</div>
</div>
</div>
<!-- Pure Tonal Depth -->
<div class="absolute inset-0 pointer-events-none bg-gradient-to-t from-black/40 via-transparent to-transparent"></div>
</main>
</body></html>
