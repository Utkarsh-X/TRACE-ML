app:
  environment: strict

camera:
  device_index: 0

recognition:
  accept_threshold: 0.72
  review_threshold: 0.58
  active_gallery_search_k: 96
  log_cooldown_seconds: 4
  persist_unknown: false
  persist_review: true
  robust_matching: true
  enable_preprocess_fallback: true
  low_quality_threshold: 0.45
  threshold_relaxation: 0.08
  unknown_reuse_threshold: 0.60

temporal:
  decision_window: 8
  smoothing_alpha: 0.6
  min_accept_votes: 2
  track_ttl_seconds: 1.8
  max_track_distance_px: 110
  min_track_iou: 0.10
  track_reuse_min_score: 0.40

rules:
  cooldown_sec: 18
  reappearance:
    window_sec: 10
    min_events: 4
  unknown:
    window_sec: 8
    min_events: 3
  instability:
    window_sec: 10
    std_threshold: 0.14

actions:
  enabled: true
  on_create:
    low: []
    medium: [log]
    high: [log, email, alarm]
  on_update:
    low: []
    medium: [log]
    high: [log]
  cooldown_sec: 25
