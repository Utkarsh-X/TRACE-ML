<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>TRACE-AML | History</title>

  <!-- Compiled Design System (no CDN) -->
  <link rel="stylesheet" href="../shared/tailwind-compiled.css" />
  <link rel="stylesheet" href="../shared/sidenav.css" />
  <link rel="stylesheet" href="../shared/base.css" />
  <link rel="stylesheet" href="../shared/trace_toast.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    .history-grid {
      display: grid;
      grid-template-columns: 1fr;
      height: 100vh;
      gap: 0;
    }
  </style>
</head>

<body class="bg-background text-on-surface font-body overflow-hidden">



<div class="app-shell">

<!-- SIDE NAV -->
<aside class="sidenav" id="sidenav">
  <div class="sidenav-header">
    <button class="hamburger-btn" id="sidenav-toggle" title="Toggle sidebar (Ctrl+B)">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <span class="sidenav-brand">TRACE-AML</span>
  </div>
  <div class="sidenav-status">
    <span class="status-dot" id="connection-badge"></span>
    <span class="status-label"></span>
  </div>
  <nav class="sidenav-nav">
    <a class="nav-item " href="../live_ops/index.html" data-tooltip="Live Ops">
      <span class="material-symbols-outlined nav-icon">monitoring</span>
      <span class="nav-label">Live Ops</span>
    </a>
    <a class="nav-item " href="../incidents/index.html" data-tooltip="Incidents">
      <span class="material-symbols-outlined nav-icon">timeline</span>
      <span class="nav-label">Incidents</span>
    </a>
    <a class="nav-item " href="../entities/index.html" data-tooltip="Entities">
      <span class="material-symbols-outlined nav-icon">hub</span>
      <span class="nav-label">Entities</span>
    </a>
    <a class="nav-item active" href="../history/index.html" data-tooltip="History">
      <span class="material-symbols-outlined nav-icon">history</span>
      <span class="nav-label">History</span>
    </a>
    <a class="nav-item " href="../database/index.html" data-tooltip="Database">
      <span class="material-symbols-outlined nav-icon">database</span>
      <span class="nav-label">Database</span>
    </a>
  </nav>
  <div class="sidenav-divider"></div>
  <nav class="sidenav-nav">
    <a class="nav-item " href="../enrollment/index.html" data-tooltip="Enrollment">
      <span class="material-symbols-outlined nav-icon">person_add</span>
      <span class="nav-label">Enrollment</span>
    </a>
  </nav>
  <div class="sidenav-spacer"></div>
  <div class="sidenav-bottom">
    <a class="nav-item " href="../settings/index.html" data-tooltip="Settings">
      <span class="material-symbols-outlined nav-icon">settings</span>
      <span class="nav-label">Settings</span>
    </a>
    <button class="nav-item nav-btn" type="button" data-tooltip="Admin">
      <span class="material-symbols-outlined nav-icon">person</span>
      <span class="nav-label">Admin</span>
    </button>
    <div class="sidenav-divider"></div>
    <button class="nav-item nav-btn" type="button" data-tooltip="Help">
      <span class="material-symbols-outlined nav-icon">help_outline</span>
      <span class="nav-label">Help</span>
    </button>
    <button class="nav-item nav-btn" type="button" data-tooltip="Exit">
      <span class="material-symbols-outlined nav-icon">logout</span>
      <span class="nav-label">Exit</span>
    </button>
  </div>
  <div class="sidenav-splitter" id="sidenav-splitter"></div>
</aside>

<!-- MAIN CANVAS -->
<main class="main-content">
<!-- MAIN CANVAS — HISTORY -->
<main class="main-content">
  <div class="history-grid">

    <!-- CENTER: Timeline (PRIMARY) -->
    <section class="bg-surface p-5 overflow-y-auto flex flex-col">

      <!-- Header + Filters -->
      <header class="flex justify-between items-start mb-5 flex-shrink-0">
        <div>
          <span class="flex items-center gap-2 mb-1">
            <span class="w-1 h-1 bg-primary inline-block"></span>
            <span class="font-mono text-[0.6875rem] uppercase tracking-[0.2em] text-outline">Global History</span>
          </span>
          <h1 class="text-3xl font-headline font-bold text-white tracking-tight uppercase">Event Timeline</h1>
        </div>
      </header>

      <!-- Filter Bar -->
      <div class="flex flex-wrap gap-3 items-end mb-6 flex-shrink-0">
        <div>
          <label class="font-mono text-[0.6rem] text-outline uppercase block mb-1">Entity ID</label>
          <input type="text" placeholder="e.g. ENT-KN-0001" class="bg-surface-high font-mono text-[0.75rem] text-white border-0 px-3 py-2 w-48 placeholder-outline-variant focus:ring-1 focus:ring-white" id="filter-entity" />
        </div>
        <div>
          <label class="font-mono text-[0.6rem] text-outline uppercase block mb-1">Event Kind</label>
          <select class="bg-surface-high font-mono text-[0.75rem] text-white border-0 px-3 py-2 cursor-pointer focus:ring-1 focus:ring-white" id="filter-kind">
            <option value="">All</option>
            <option value="event">Events</option>
            <option value="alert">Alerts</option>
            <option value="incident">Incidents</option>
            <option value="action">Actions</option>
          </select>
        </div>
        <div>
          <label class="font-mono text-[0.6rem] text-outline uppercase block mb-1">Suppression</label>
          <select class="bg-surface-high font-mono text-[0.75rem] text-white border-0 px-3 py-2 cursor-pointer focus:ring-1 focus:ring-white" id="filter-suppress">
            <option value="0">OFF</option>
            <option value="1" selected>1 MIN</option>
            <option value="5">5 MIN</option>
            <option value="15">15 MIN</option>
          </select>
        </div>
        <button class="px-4 py-2 bg-primary text-on-primary font-mono text-[0.65rem] uppercase tracking-widest cursor-pointer border-0 hover:bg-on-surface transition-colors" id="filter-go">Query</button>
        <button class="px-4 py-2 bg-surface-high text-on-surface-variant font-mono text-[0.65rem] uppercase tracking-widest cursor-pointer border-0 hover:bg-surface-bright transition-colors" id="filter-refresh">Refresh</button>
      </div>

      <!-- Timeline Events -->
      <div class="flex-1 space-y-2 overflow-y-auto" id="timeline-results">
        <!-- Skeleton Loader -->
        <div class="space-y-2 animate-pulse">
          <div class="bg-surface-container p-4">
            <div class="flex items-center justify-between mb-2">
              <div class="flex items-center gap-2"><div class="w-16 h-4 bg-surface-high rounded"></div><div class="w-32 h-4 bg-surface-high rounded"></div></div>
              <div class="w-24 h-3 bg-surface-high rounded"></div>
            </div>
            <div class="w-full h-3 bg-surface-high rounded mb-1"></div>
            <div class="w-3/4 h-3 bg-surface-high rounded"></div>
            <div class="mt-3 flex gap-3"><div class="w-20 h-3 bg-surface-high rounded"></div><div class="w-20 h-3 bg-surface-high rounded"></div></div>
          </div>
          <div class="bg-surface-container p-4">
            <div class="flex items-center justify-between mb-2">
              <div class="flex items-center gap-2"><div class="w-16 h-4 bg-surface-high rounded"></div><div class="w-32 h-4 bg-surface-high rounded"></div></div>
              <div class="w-24 h-3 bg-surface-high rounded"></div>
            </div>
            <div class="w-5/6 h-3 bg-surface-high rounded"></div>
          </div>
          <div class="bg-surface-container p-4">
            <div class="flex items-center justify-between mb-2">
              <div class="flex items-center gap-2"><div class="w-16 h-4 bg-surface-high rounded"></div><div class="w-32 h-4 bg-surface-high rounded"></div></div>
              <div class="w-24 h-3 bg-surface-high rounded"></div>
            </div>
            <div class="w-full h-3 bg-surface-high rounded mb-1"></div>
            <div class="w-1/2 h-3 bg-surface-high rounded"></div>
          </div>
          <div class="bg-surface-container p-4">
            <div class="flex items-center justify-between mb-2">
              <div class="flex items-center gap-2"><div class="w-16 h-4 bg-surface-high rounded"></div><div class="w-32 h-4 bg-surface-high rounded"></div></div>
              <div class="w-24 h-3 bg-surface-high rounded"></div>
            </div>
            <div class="w-4/5 h-3 bg-surface-high rounded"></div>
          </div>
        </div>
      </div>
    </section>

  </div>
</main>

<!-- Service Layer -->
<script src="../shared/trace_toast.js?v=2"></script>
<script src="../shared/trace_client.js?v=2"></script>
<script src="../shared/trace_render.js?v=2"></script>
<script src="../shared/sidenav.js?v=2"></script>
<script src="./history.js?v=2"></script>

</div><!-- /app-shell -->
</body>
</html>
